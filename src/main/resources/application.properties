spring.application.name=virtual-engine

# Server (enable SSL in production with certificate configured)
server.port=8443
#server.ssl.key-store=classpath:keystore.p12
#server.ssl.key-store-password=changeit
#server.ssl.key-store-type=PKCS12

# Datasource (Postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/virtualengine
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# JWT
jwt.secret=ReplaceThisWithAStrongSecretKey
jwt.expirationMs=3600000

# Websocket
spring.websocket.path=/ws
